<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rocking Music Archive</title>

<link rel="stylesheet" href="style.css">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4151063304035250"
     crossorigin="anonymous"></script>

</head>

<body>

<header>

<h1>Rocking Music Archive</h1>

<p>邦楽・洋楽アルバム管理サイト</p>

<nav>
<a href="http://x.com/debaucherycrown" target="_blank" rel="noopener noreferrer">X</a> 
<a href="http://www.youtube.com/@rocking-music-1962" target="_blank" rel="noopener noreferrer">YouTube</a>
<a href="#" target="_blank">Instagram</a>
<a href="#" target="_blank">その他SNS</a>
</nav>

</header>

<main>

<section class="form-area">

<h2>アルバム追加</h2>

<div class="form-box">

<label>邦楽 / 洋楽</label>

<select id="category">
<option value="japanese">邦楽</option>
<option value="western">洋楽</option>
</select>

<label>アルバム名</label>
<input
type="text"
id="albumName"
placeholder="アルバム名">

<label>アーティスト名</label>
<input
type="text"
id="artistName"
placeholder="アーティスト名">

<label>発売年</label>
<input
type="number"
id="year"
placeholder="2026">

<label>オリコン順位</label>
<input
type="number"
id="chart"
placeholder="1">

<label>ジャケット画像</label>
<input
type="file"
id="jacket"
accept="image/*">

<label>評価</label>

<select id="rank">
<option value="S">S</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
<option value="E">E</option>
</select>

<label>コメント</label>

<textarea
id="comment"
rows="5"
placeholder="コメントを書いてください"></textarea>

<button id="addButton">

追加

</button>

</div>

</section>

<section class="ad-area">

    <p class="ad-label">
        スポンサーリンク
    </p>

    <div id="googleAdArea">

        <!-- AdSense承認後、ここに広告コードを貼る -->

        <p class="ad-placeholder">
            広告掲載予定
        </p>

    </div>

</section>

<h2>邦楽アルバム</h2>

<div
id="japaneseList"
class="album-list">

</div>

</section>

<section>

<h2>洋楽アルバム</h2>

<div
id="westernList"
class="album-list">

</div>

</section>

</main>

<footer>

<p>

©2026 Rocking Music Archive

</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="script.js"></script>

</body>

</html>
